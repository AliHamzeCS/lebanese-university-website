<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebanese University</title>
    <link rel="stylesheet" href="apply.css">
</head>

<body>
   
    <header>
        <img src="logo.png" alt="logo" width="60" height="50">
        <h2 class="university-name">Lebanese University</h2>
        <a href="HTML2.html" class="nav-link">Home</a>
        <a href="#University" class="nav-link">About</a>
        <a href="" class="apply-link">Apply</a>
    </header>
    <div>
        <p class="hero-title">Start Your Journey</p>
        <p class="hero-description">Complete the application form below to apply for the upcoming academic year</p>
    </div>
    
    <form action="#" method="post">
        
        <section class="form-section">
            <p class="Information">Personal Information</p>
            <hr>
            <label class="first-name-label" for="name">First Name</label>
            <label class="last-name-label" for="name2">Last Name</label>
            <br>
            <input class="first-name-input" type="text" id="name" placeholder="ali" required>
            <input class="last-name-input" type="text" id="name2" placeholder="hamze" required>
            <br>
            <label class="email-label" for="email">Email Address</label>
            <label class="phone-label" for="r">Phone Number</label>
            <br>
            <input class="email-input" type="email" id="email" placeholder="ali.doe@example.com" required>
            <input class="phone-input" type="tel" id="r" placeholder="+961 77 777 777" required>
            <br>
            <label class="date-label" for="date">Date of Birth</label>
            <br>
            <input class="date-input" type="date" id="date" required>
            <br>
            <p class="academic-title">Academic History</p>
            <hr class="hr">
            <br>
            <label class="school-label" for="Schoolname">High School name</label>
            <br>
            <input class="school-input" type="text" id="Schoolname" placeholder="Enter your high school Name">
            <br>
            <label class="gpa-label" for="gpa">High School GPA / Percentage</label>
            <br>
            <input class="gpa-input" type="text" id="gpa" placeholder="e.g.3.8 or 95%">
            <br>
            <label class="year-label" for="year">Graduation Year</label>
            <br>
            <select class="year-select" id="year">
                <optgroup name="year" label="select year">
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </optgroup>
            </select>
            <br>
            <label class="program-title" for="selection">Program Selection</label>
            <br>
            <hr class="hr1">
            <br>
            <label class="program-label" for="selection">Desired Academic Program</label>
            <br>
            <select class="program-select" name="selection" id="selection">
                <optgroup label="select a program">
                    <option value="">s</option>
                    <option value="">s</option>
                </optgroup>
            </select>
            <br>
            <input type="submit" class="submit-button">
        </section>
        <p class="ff"></p>
    </form>
</body>

</html>
